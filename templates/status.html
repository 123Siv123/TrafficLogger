<!DOCTYPE html>
<html>
<head>
<title>Status</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">

        <h3>Violation Details</h3>

        <p><b>Vehicle:</b> {{ record.vehicle_number }}</p>
        <p><b>Type:</b> {{ record.violation_type }}</p>
        <p><b>Location:</b> {{ record.location }}</p>
        <p><b>Status:</b> {{ record.status }}</p>

        <hr>

        <h4>QR Code</h4>

        <img src="{{ url_for('static', filename=qr) }}" width="200">

    </div>
</div>
<h5>Evidence:</h5>

{% if record.image %}
    <img src="/static/uploads/{{ record.image }}" width="250">
{% else %}
    <p>No image uploaded</p>
{% endif %}

</body>
</html>
