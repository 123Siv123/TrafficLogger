<!DOCTYPE html>
<html>
<head>
<title>Traffic Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI';
}

/* Layout */
.wrapper {
    display: flex;
}

/* Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: linear-gradient(180deg, #ff4e50, #f9d423, #38ef7d);
    padding: 20px;
    position: fixed;
}

.sidebar h4 {
    text-align: center;
    margin-bottom: 30px;
}

.sidebar a {
    display: block;
    text-align: center;
    padding: 14px;
    margin: 10px 0;
    border-radius: 10px;
    background: rgba(255,255,255,0.8);
    font-weight: bold;
    color: black;
    text-decoration: none;
}

/* Main area */
.main {
    margin-left: 240px;
    width: calc(100% - 240px);
}

/* Topbar */
.topbar {
    height: 60px;
    background: white;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 25px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

/* Content */
.content {
    padding: 30px;
}

/* Card */
.card-custom {
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
        <h4>🚦 Traffic</h4>
        <a href="/dashboard">Dashboard</a>
        <a href="/add">Add Violation</a>
        <a href="/search">Search</a>
        <a href="/logout">Logout</a>
    </div>

    <!-- Main -->
    <div class="main">

        <!-- Topbar -->
        <div class="topbar">
            <h5>Traffic Violation System</h5>
            <span>Admin</span>
        </div>

        <!-- Content -->
        <div class="content">
            {% block content %}{% endblock %}
        </div>

    </div>

</div>

</body>
</html>
